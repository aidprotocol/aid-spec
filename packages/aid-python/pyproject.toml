[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aid-trust"
version = "1.0.0"
description = "AID Protocol trust scoring for Python — CrewAI, LangGraph, AutoGen plugins"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "AID Protocol", email = "hello@claw-net.org"}]
keywords = ["aid", "trust", "agent", "identity", "crewai", "langgraph", "reputation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security :: Cryptography",
]

[project.urls]
Homepage = "https://aidprotocol.org"
Repository = "https://github.com/aidprotocol/aid-spec"
